{% extends 'base.html' %}
{% block title %}Delete Notification{% endblock %}
{% block page_title %}Delete Notification{% endblock %}
{% block content %}
<div class="form-page-wrapper">
  <div class="card danger-card">
    <div class="card-header"><h3>Delete Notification</h3></div>
    <div class="card-body">
      <p>Delete this notification: <strong>{{ notification.title }}</strong>?</p>
      <form method="post">{% csrf_token %}
        <div class="form-actions">
          <a href="{% url 'notifications:list' %}" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-danger">Delete</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
