{% extends 'base.html' %}
{% block title %}Delete Issue{% endblock %}
{% block page_title %}Delete Issue{% endblock %}
{% block content %}
<div class="form-page-wrapper">
  <div class="card danger-card">
    <div class="card-header"><h3><i class="bi bi-exclamation-triangle-fill text-danger"></i> Delete Issue</h3></div>
    <div class="card-body">
      <p>Are you sure you want to delete issue <strong>#{{ issue.pk }}: {{ issue.title }}</strong>? This action cannot be undone.</p>
      <form method="post">
        {% csrf_token %}
        <div class="form-actions">
          <a href="{% url 'issues:detail' issue.pk %}" class="btn btn-outline">Cancel</a>
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Delete Issue</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
