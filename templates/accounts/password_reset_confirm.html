{% extends 'base.html' %}
{% block title %}Set New Password{% endblock %}
{% block auth_content %}
<div class="auth-card">
  <h1 class="auth-title">Set New Password</h1>
  <form method="post">{% csrf_token %}
    {% for field in form %}
    <div class="form-group"><label class="form-label">{{ field.label }}</label>{{ field }}
    {% for error in field.errors %}<div class="form-error">{{ error }}</div>{% endfor %}</div>
    {% endfor %}
    <button type="submit" class="btn btn-primary btn-block">Set Password</button>
  </form>
</div>
{% endblock %}
