{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block auth_content %}
<div class="auth-card text-center">
  <div class="auth-logo text-success"><i class="bi bi-check-circle-fill"></i></div>
  <h1 class="auth-title">Password Updated!</h1>
  <p class="auth-subtitle">Your password has been changed successfully.</p>
  <a href="{% url 'login' %}" class="btn btn-primary btn-block">Sign In Now</a>
</div>
{% endblock %}
