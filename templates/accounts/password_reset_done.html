{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block auth_content %}
<div class="auth-card text-center">
  <div class="auth-logo text-success"><i class="bi bi-envelope-check-fill"></i></div>
  <h1 class="auth-title">Check Your Email</h1>
  <p class="auth-subtitle">We've sent a password reset link to your email address.</p>
  <a href="{% url 'login' %}" class="btn btn-primary btn-block">Back to Login</a>
</div>
{% endblock %}
